# Supabase local config. See https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://windexgolf.com"
additional_redirect_urls = [
  "https://windexgolf.com",
  "https://windexgolf.com/**",
  "https://www.windexgolf.com",
  "https://www.windexgolf.com/**",
  "https://late-add-v2.vercel.app",
  "https://late-add-v2.vercel.app/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

# `enable_confirmations = true` is required for the OTP-code invite flow
# (2026-05-14). Previously `false` from the magic-link era, where a magic-link
# click was simultaneously the email confirmation AND the sign-in. Under that
# config, GoTrue exposes `mailer_autoconfirm: true`, and any `signInWithOtp`
# call against an unconfirmed user triggers an immediate auto-confirm + auto-
# sign-in side effect — the user's `email_confirmed_at` and `last_sign_in_at`
# get populated and a session is created BEFORE the human types the OTP code.
# That defeats the entire point of code-only OTP. With confirmations enabled,
# the OTP send is just a send; verifyOtp does the actual confirmation work
# when the human types the code. The production dashboard's
# Authentication → Providers → Email → "Confirm email" toggle was flipped to
# ON at the same time as this commit (dashboard config is the source of truth;
# this file mirrors it for local dev).
[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "60s"
otp_length = 6
otp_expiry = 3600

[auth.email.template.magic_link]
subject = "Your Windex login code"
content_path = "./supabase/templates/otp.html"

# All five additional GoTrue email templates point at the same code-only
# otp.html to defuse the {{ .ConfirmationURL }} landmines (2026-05-14).
# Default GoTrue templates for confirmation/invite/recovery/email_change all
# embed clickable magic-link URLs — exactly the attack surface that produced
# phantom confirmations for three YC Windex players via email-security
# scanners and iOS Mail prefetch. Reauthentication is code-only by default
# but pinned here to remove dependency on Supabase upstream not changing
# that default later. All point at the same otp.html because the body is
# identical — separate files would invite drift. Production dashboard was
# PATCHed via /v1/projects/{ref}/config/auth at the same time as this
# commit (dashboard is source of truth; this file mirrors for local dev).
# Body text says "Enter this code to sign in" which is technically imprecise
# for email_change and reauthentication flows — both flows are dormant in
# Windex (no user-facing UI), so the imprecision is acceptable. BACKLOG.md
# tracks copy refinement for if/when those flows ship.
[auth.email.template.confirmation]
subject = "Your Windex login code"
content_path = "./supabase/templates/otp.html"

[auth.email.template.invite]
subject = "Your Windex login code"
content_path = "./supabase/templates/otp.html"

[auth.email.template.recovery]
subject = "Your Windex login code"
content_path = "./supabase/templates/otp.html"

[auth.email.template.email_change]
subject = "Your Windex login code"
content_path = "./supabase/templates/otp.html"

[auth.email.template.reauthentication]
subject = "Your Windex login code"
content_path = "./supabase/templates/otp.html"

# Disable Supabase platform-level JWT verification for all Edge Functions.
# Each function does its own auth via getUser(token) in the handler code.
# Platform verify_jwt uses different keys when linked to a remote project,
# causing "Invalid JWT" errors even with valid tokens.
[functions.get-standings]
verify_jwt = false
[functions.events]
verify_jwt = false
[functions.ingest-event-results]
verify_jwt = false
[functions.compute-money-deltas]
verify_jwt = false
[functions.generate-payment-requests]
verify_jwt = false
[functions.review]
verify_jwt = false
[functions.standings-player-history]
verify_jwt = false
[functions.get-points-analysis]
verify_jwt = false
[functions.get-points-matrix]
verify_jwt = false
[functions.players]
verify_jwt = false
[functions.get-groups]
verify_jwt = false
[functions.groups]
verify_jwt = false
[functions.get-seasons]
verify_jwt = false
[functions.seasons]
verify_jwt = false
[functions.admin-reset]
verify_jwt = false
[functions.invite-player]
verify_jwt = false
[functions.create-group]
verify_jwt = false
[functions.send-invite]
verify_jwt = false
[functions.generate-broadcast-notes]
verify_jwt = false
