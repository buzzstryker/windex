# Supabase local config. See https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://app.lateaddgolf.com"
additional_redirect_urls = [
  "https://app.lateaddgolf.com",
  "https://app.lateaddgolf.com/**",
  "https://late-add-v2.vercel.app",
  "https://late-add-v2.vercel.app/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
max_frequency = "60s"
otp_length = 6
otp_expiry = 3600

[auth.email.template.magic_link]
subject = "Your Late Add login code"
content_path = "./supabase/templates/otp.html"

# Disable Supabase platform-level JWT verification for all Edge Functions.
# Each function does its own auth via getUser(token) in the handler code.
# Platform verify_jwt uses different keys when linked to a remote project,
# causing "Invalid JWT" errors even with valid tokens.
[functions.get-standings]
verify_jwt = false
[functions.events]
verify_jwt = false
[functions.ingest-event-results]
verify_jwt = false
[functions.compute-money-deltas]
verify_jwt = false
[functions.generate-payment-requests]
verify_jwt = false
[functions.review]
verify_jwt = false
[functions.standings-player-history]
verify_jwt = false
[functions.get-points-analysis]
verify_jwt = false
[functions.get-points-matrix]
verify_jwt = false
[functions.players]
verify_jwt = false
[functions.get-groups]
verify_jwt = false
[functions.groups]
verify_jwt = false
[functions.get-seasons]
verify_jwt = false
[functions.seasons]
verify_jwt = false
[functions.admin-reset]
verify_jwt = false
